<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>pyroPythia — Greek burned-area mapper</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
  #map { position: absolute; inset: 0; }
  .panel {
    position: absolute; top: 12px; left: 12px; z-index: 2;
    background: rgba(18, 18, 22, 0.88); color: #eee; border-radius: 10px;
    padding: 14px 16px; max-width: 300px; backdrop-filter: blur(6px);
    box-shadow: 0 4px 18px rgba(0,0,0,.4);
  }
  .panel h1 { font-size: 17px; margin: 0 0 2px; }
  .panel h1 .pyro { color: #ff7043; }
  .panel .sub { font-size: 11.5px; color: #9aa0a6; margin-bottom: 10px; }
  .stat { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .stat b { font-variant-numeric: tabular-nums; }
  .legend { margin-top: 10px; font-size: 12px; }
  .legend div { display: flex; align-items: center; gap: 7px; padding: 1.5px 0; }
  .swatch { width: 14px; height: 14px; border-radius: 3px; flex: none; }
  .slider { margin-top: 12px; font-size: 12px; color: #bbb; }
  .slider input { width: 100%; }
  .footer { margin-top: 10px; font-size: 10.5px; color: #777; }
  .footer a { color: #999; }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1><span class="pyro">pyro</span>Pythia</h1>
  <div class="sub">Greek burned-area mapper — v0 demo</div>
  <div id="stats"></div>
  <div class="legend" id="legend"></div>
  <div class="slider">
    severity opacity
    <input id="opacity" type="range" min="0" max="100" value="80" />
  </div>
  <div class="footer">
    Sentinel-2 dNBR (USGS classes) · perimeter: Hellenic Fire Service via
    <a href="https://github.com/Orion-AI-Lab/FLOGA">FLOGA</a> · imagery © Esri
  </div>
</div>
<script>
const SEV = [
  ["low", "#fee08b"], ["moderate-low", "#fdae61"],
  ["moderate-high", "#f46d43"], ["high", "#a50026"],
];

const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      esri: {
        type: "raster",
        tiles: ["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
        tileSize: 256,
        attribution: "Imagery © Esri, Maxar, Earthstar Geographics",
      },
    },
    layers: [{ id: "esri", type: "raster", source: "esri" }],
  },
  center: [23.3, 38.9],
  zoom: 10,
  preserveDrawingBuffer: true,
});
map.addControl(new maplibregl.NavigationControl(), "top-right");

async function load() {
  const meta = await (await fetch("data/evia_meta.json")).json();
  const sevBounds = (await (await fetch("data/evia_severity.json")).json()).bounds;
  const [w, s, e, n] = sevBounds;

  map.jumpTo({ center: meta.center, zoom: 10.6 });

  map.addSource("severity", {
    type: "image",
    url: "data/evia_severity.png",
    coordinates: [[w, n], [e, n], [e, s], [w, s]],
  });
  map.addLayer({ id: "severity", type: "raster", source: "severity",
                 paint: { "raster-opacity": 0.8, "raster-resampling": "nearest" } });

  map.addSource("perimeter", { type: "geojson", data: "data/evia_perimeter.geojson" });
  map.addLayer({ id: "perimeter", type: "line", source: "perimeter",
                 paint: { "line-color": "#ffffff", "line-width": 1.8, "line-opacity": 0.9 } });

  const total = Object.values(meta.severity_ha).reduce((a, b) => a + b, 0);
  document.getElementById("stats").innerHTML = `
    <div class="stat"><span>Fire</span><b>Evia (Euboea) ${meta.year}</b></div>
    <div class="stat"><span>Pre → post</span><b>${meta.pre_date} → ${meta.post_date}</b></div>
    <div class="stat"><span>Burned (Fire Service)</span><b>${meta.label_ha.toLocaleString()} ha</b></div>
    <div class="stat"><span>Burned (dNBR &gt; 0.27)</span><b>${meta.dnbr_ha.toLocaleString()} ha</b></div>`;

  document.getElementById("legend").innerHTML =
    SEV.map(([k, c]) => `<div><span class="swatch" style="background:${c}"></span>
      ${k} <span style="margin-left:auto;color:#9aa0a6">${(meta.severity_ha[k] || 0).toLocaleString()} ha</span></div>`).join("");

  document.getElementById("opacity").addEventListener("input", (ev) => {
    map.setPaintProperty("severity", "raster-opacity", ev.target.value / 100);
  });
}
map.on("load", load);
</script>
</body>
</html>
